version: '3.9'

services:

  # ─── Nginx reverse proxy (SSL termination) ───────────────────────────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html

  # ─── Let's Encrypt auto-cert ─────────────────────────────────────────────────
  acme-companion:
    image: nginxproxy/acme-companion:latest
    restart: unless-stopped
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme_data:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: liam.reckley@gmail.com

  # ─── Database: Cloud SQL Auth Proxy ───────────────────────────────────────────
  # Postgres lives in the shared dymphna-infrastructure Cloud SQL instance. VoIP gets
  # its OWN database (dymphna_voip) there, alongside Onboarding/EHR/Financials. This
  # proxy exposes a local 5432 that tunnels to Cloud SQL using the VM's attached
  # service account (grant it roles/cloudsql.client). Redis was unused — removed.
  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
    restart: unless-stopped
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${INSTANCE_CONNECTION_NAME}"
    expose:
      - "5432"
    # If the VM service-account (ADC via metadata) isn't usable, add a key instead:
    #   command: [..., "--credentials-file=/secrets/cloudsql-sa.json"]
    #   volumes: [ "./secrets:/secrets:ro" ]

  # ─── Asterisk PBX ────────────────────────────────────────────────────────────
  asterisk:
    build:
      context: .
      dockerfile: asterisk.Dockerfile
    restart: unless-stopped
    # VoIP needs direct UDP access for RTP media. With host networking the WebRTC
    # listeners bind the host directly — open these on the GCP firewall:
    #   tcp/8089 (wss), udp/10000-20000 (RTP), udp/5060 (voip.ms trunk).
    network_mode: host
    environment:
      VOIPMS_SIP_USERNAME: ${VOIPMS_SIP_USERNAME:-changeme}
      VOIPMS_SIP_PASSWORD: ${VOIPMS_SIP_PASSWORD:-changeme}
    volumes:
      - ./asterisk/pjsip.conf.template:/etc/asterisk/pjsip.conf.template:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/manager.conf:/etc/asterisk/manager.conf:ro
      - ./asterisk/voicemail.conf:/etc/asterisk/voicemail.conf:ro
      - ./asterisk/features.conf:/etc/asterisk/features.conf:ro
      - ./asterisk/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      # Reuse the Let's Encrypt cert that acme-companion issues for the API host
      # (voip.dymphnacounseling.com) to terminate TLS for wss on :8089.
      - nginx_certs:/etc/asterisk/keys:ro
      - asterisk_spool:/var/spool/asterisk
      - asterisk_sounds:/var/lib/asterisk/sounds/custom
      - pjsip_extensions:/etc/asterisk/pjsip_extensions.conf
    healthcheck:
      test: ['CMD', 'asterisk', '-rx', 'core show uptime']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FastAPI VoIP service ─────────────────────────────────────────────────────
  voip-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No public port — traffic comes through nginx-proxy only
    expose:
      - '8001'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ASTERISK_HOST: host.docker.internal
      ASTERISK_PORT: 5038
      ASTERISK_USERNAME: dymphna_ami
      ASTERISK_SECRET: ${ASTERISK_SECRET:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      VOIPMS_API_USERNAME: ${VOIPMS_API_USERNAME:-}
      VOIPMS_API_PASSWORD: ${VOIPMS_API_PASSWORD:-}
      VOIPMS_DID: ${VOIPMS_DID:-}
      VOIPMS_WEBHOOK_TOKEN: ${VOIPMS_WEBHOOK_TOKEN:-}
      S3_BUCKET: ${S3_BUCKET:-dymphna-voip-recordings}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.dymphna.counseling}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      SIP_WS_HOST: ${SIP_WS_HOST:-voip.dymphnacounseling.com}
      SIP_WS_PORT: ${SIP_WS_PORT:-8089}
      SIP_DOMAIN: ${SIP_DOMAIN:-voip.dymphnacounseling.com}
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      CORS_ORIGINS: https://ehr.dymphnacounseling.com
      PJSIP_EXTENSIONS_PATH: /etc/asterisk/pjsip_extensions.conf
      # nginx-proxy picks these up automatically
      VIRTUAL_HOST: voip.dymphnacounseling.com
      VIRTUAL_PORT: 8001
      LETSENCRYPT_HOST: voip.dymphnacounseling.com
      LETSENCRYPT_EMAIL: liam.reckley@gmail.com
    volumes:
      - ./secrets:/secrets:ro
      - pjsip_extensions:/etc/asterisk/pjsip_extensions.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloud-sql-proxy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/voip/health']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  asterisk_spool:
  asterisk_sounds:
  pjsip_extensions:
  nginx_certs:
  nginx_vhost:
  nginx_html:
  acme_data:
