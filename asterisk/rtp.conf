; ─── RTP media ports + ICE ────────────────────────────────────────────────────
; WebRTC needs a bounded RTP range opened on the GCP firewall (udp/10000-20000)
; and Asterisk must advertise its PUBLIC IP as an ICE candidate. Since the VM sits
; behind GCP 1:1 NAT, `stunaddr` lets Asterisk discover its public IP and add a
; server-reflexive candidate so the mobile client can reach our media.

[general]
rtpstart=10000
rtpend=20000
strictrtp=yes
stunaddr=stun.l.google.com:19302
