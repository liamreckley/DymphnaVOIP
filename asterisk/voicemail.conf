; Asterisk voicemail configuration

[general]
format=wav49|gsm|wav
serveremail=voicemail@dymphna.care
attach=yes
maxmessage=300          ; 5-minute max voicemail
maxgreet=60
skipms=3000
maxsilence=10
silencethreshold=128
maxlogins=3
emailsubject=Voicemail from ${VM_CALLERID}
emailbody=You have a new voicemail from ${VM_CALLERID}.\nDuration: ${VM_DUR} seconds.\n\nDymphna
emaildateformat=%A, %d %B %Y at %H:%M:%S
pagerfromstring=Dymphna Voicemail
pagersubject=New VM

[zonemessages]
eastern=America/New_York|'vm-received' Q 'digits/at' IMp

; ─── Voicemail boxes ──────────────────────────────────────────────────────────
; Format: mailbox => password,Full Name,email

[dymphna]
; Main practice box (front desk checks this)
100 => 0000,Front Desk,frontdesk@dymphna.care

; Individual extension boxes
; Add entries here as staff are onboarded:
; 101 => 1234,Jane Smith,jane@dymphna.care
; 102 => 5678,John Doe,john@dymphna.care
