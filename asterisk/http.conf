; ─── Asterisk built-in HTTP server ───────────────────────────────────────────
; Required for SIP-over-WebSocket (WebRTC softphone). The PJSIP `wss` transport
; rides on this server's TLS listener (port 8089).
;
; TLS cert: we reuse the Let's Encrypt cert that acme-companion issues for
; voip.dymphnacounseling.com (mounted read-only at /etc/asterisk/keys via the
; nginx_certs volume — see docker-compose.yml). `<host>.crt` is the full chain.
;
; GCP firewall must allow inbound tcp/8089 (wss) on the Asterisk VM.

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088                ; plain ws (kept internal; prefer wss)
tlsenable=yes
tlsbindaddr=0.0.0.0:8089     ; wss — what the mobile app connects to
tlscertfile=/etc/asterisk/keys/voip.dymphnacounseling.com.crt
tlsprivatekey=/etc/asterisk/keys/voip.dymphnacounseling.com.key
