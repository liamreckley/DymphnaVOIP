; Call feature codes

[general]
parkext => 700           ; dial 700 to park a call
parkpos => 701-704       ; parked calls land on 701–704 (pick up by dialing slot)
parkingtime => 300       ; 5 minutes before parked call recalls parker
parkedmusicclass => default
courtesytone = beep

[featuremap]
blindxfer => #1          ; blind transfer: #1 <ext> #
atxfer => *2             ; attended transfer: *2 <ext> #
disconnect => *0         ; hang up
automon => *3            ; toggle call recording
