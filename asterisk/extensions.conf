; ─── Dymphna Asterisk Dialplan ────────────────────────────────────────────────
; Contexts:
;   dymphna-inbound   — calls arriving from VoIP.ms trunk
;   dymphna-internal  — inter-extension calls
;   dymphna-outbound  — calls placed by staff to external numbers
;   dymphna-ivr       — simple IVR / auto-attendant
;   dymphna-voicemail — voicemail handling

[globals]
VOIPMS_DID=9563323219
OFFICE_HOURS_START=0800
OFFICE_HOURS_END=1700
LUNCH_START=1200
LUNCH_END=1300
VOICEMAIL_MAIN=100@dymphna-voicemail
RING_TIMEOUT=30

; ─── Inbound from VoIP.ms trunk ───────────────────────────────────────────────

[dymphna-inbound]

; --- Route based on time of day ---
exten => ${VOIPMS_DID},1,NoOp(Inbound call from ${CALLERID(num)})
 same => n,GotoIfTime(${OFFICE_HOURS_START}-${LUNCH_START},mon-fri,*,*?dymphna-inbound,${EXTEN},morning)
 same => n,GotoIfTime(${LUNCH_END}-${OFFICE_HOURS_END},mon-fri,*,*?dymphna-inbound,${EXTEN},afternoon)
 same => n,Goto(dymphna-ivr,after-hours,1)

; --- Morning / afternoon: ring all extensions, fall to voicemail ---
exten => ${VOIPMS_DID},morning,Dial(PJSIP/100&PJSIP/101&PJSIP/102&PJSIP/103,${RING_TIMEOUT},gHh)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same => n,GotoIf($["${DIALSTATUS}" = "CHANUNAVAIL"]?unavail)
 same => n,Goto(dymphna-ivr,after-hours,1)
 same => n(busy),Playback(all-circuits-busy-now)
 same => n,Hangup()
 same => n(unavail),Goto(dymphna-ivr,after-hours,1)

exten => ${VOIPMS_DID},afternoon,Goto(${EXTEN},morning)

; --- Lunch routing ---
exten => ${VOIPMS_DID},lunch,Goto(dymphna-ivr,lunch,1)

; --- Catch-all (direct DID, no context match) ---
exten => _.,1,Goto(${VOIPMS_DID},1)

; ─── Internal extension dialing ───────────────────────────────────────────────

[dymphna-internal]

; Ring a specific extension (1xx)
exten => _1XX,1,NoOp(Internal call to ${EXTEN})
 same => n,Set(CHANNEL(language)=en)
 same => n,Dial(PJSIP/${EXTEN},${RING_TIMEOUT},gH)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?voicemail)
 same => n,Hangup()
 same => n(voicemail),Goto(dymphna-voicemail,${EXTEN},1)

; Park retrieval (extensions 71–74)
exten => _7[1-4],1,ParkedCall(${EXTEN})

; Speed dial: 0 rings front desk
exten => 0,1,Goto(100,1)

; ─── Outbound calls via VoIP.ms trunk ────────────────────────────────────────

[dymphna-outbound]

; 10-digit NANP
exten => _NXXXXXXXXX,1,NoOp(Outbound to ${EXTEN})
 same => n,Set(CALLERID(num)=${VOIPMS_DID})
 same => n,Set(CALLERID(name)=Dymphna)
 same => n,Dial(PJSIP/voipms/${EXTEN},60,gH)
 same => n,Hangup()

; 11-digit with leading 1
exten => _1NXXXXXXXXX,1,Goto(${EXTEN:1},1)

; ─── Auto-attendant / IVR ─────────────────────────────────────────────────────

[dymphna-ivr]

exten => after-hours,1,Answer()
 same => n,Wait(1)
 same => n,Playback(after-hours-greeting)   ; custom recording: asterisk/sounds/after-hours-greeting.gsm
 same => n,WaitExten(5)
 same => n,Goto(default,1)

exten => lunch,1,Answer()
 same => n,Wait(1)
 same => n,Playback(lunch-greeting)
 same => n,WaitExten(5)
 same => n,Goto(default,1)

; DTMF options (after-hours IVR)
exten => 1,1,Goto(dymphna-voicemail,main,1)            ; leave voicemail
exten => 0,1,Goto(dymphna-internal,0,1)                 ; try front desk anyway
exten => i,1,Playback(invalid)
 same => n,Goto(after-hours,1)
exten => t,1,Goto(dymphna-voicemail,main,1)

exten => default,1,Goto(dymphna-voicemail,main,1)

; ─── Voicemail ────────────────────────────────────────────────────────────────

[dymphna-voicemail]

; Main practice voicemail box (mailbox 100)
exten => main,1,Answer()
 same => n,Wait(1)
 same => n,Playback(please-leave-msg)
 same => n,VoiceMail(100@dymphna,u)
 same => n,Hangup()

; Per-extension voicemail
exten => _1XX,1,Answer()
 same => n,Wait(1)
 same => n,VoiceMail(${EXTEN}@dymphna,u)
 same => n,Hangup()

; Check voicemail (dial *98 from any extension)
exten => *98,1,Answer()
 same => n,VoiceMailMain(${CALLERID(num)}@dymphna)
 same => n,Hangup()
