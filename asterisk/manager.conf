; Asterisk AMI configuration
; The FastAPI VoIP service connects to this interface to control calls.

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0
displayconnects = yes

; FastAPI backend AMI user
[dymphna_ami]
secret = change-me-in-production       ; must match ASTERISK_SECRET in .env
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.0
permit = 172.16.0.0/255.240.0.0       ; Docker bridge network
read = all
write = all,originate
